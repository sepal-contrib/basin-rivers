name: basin-rivers
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - sepal-ui>=2.22.1,<3
  - pyproj # Always include to avoid PROJ conflicts
  - setuptools<=80
  - rasterio
  - seaborn
  - matplotlib
  - pip
  - gdal=3.8.3
  - plotly=5.24.1
  - pip:
      - git+https://github.com/openforis/earthengine-api.git@v1.1.5rc0#egg=earthengine-api&subdirectory=python
      - localtileserver<=0.10.0
